server {
    listen 80;
    root /usr/share/nginx/html;

    # SignalR — needs the WebSocket upgrade headers.
    location /hubs/ {
        proxy_pass http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
        proxy_pass http://localhost:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Wall display is its own Vite entry (wall.html) with its own client-side navigation.
    location /wall {
        try_files $uri $uri/ /wall.html;
    }

    # Phone app — SPA fallback for React Router's client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
