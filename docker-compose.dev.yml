# Local development / single-box test deployment.
# Expects TimescaleDB/PostgreSQL running on the host machine.
# Copy .env.example to .env, fill in the required values, then run:
#   docker compose -f docker-compose.dev.yml up --build

services:

  # ─── NetLoom application ───────────────────────────────────────────────────
  chaoscoordinator:
    network_mode: bridge
    container_name: chaos-coordinator-test
    build:
      context: .
      dockerfile: Dockerfile.combined
      # Build args are substituted from the shell/.env at `docker compose build` time — env_file:
      # below only populates the container's runtime env, so it does NOT satisfy this. Export
      # TURNSTILE_SITE_KEY (e.g. `export $(grep TURNSTILE_SITE_KEY ~/chaoscoordinator.dev.env)`)
      # before `docker compose -f docker-compose.dev.yml up --build`.
      args:
        TURNSTILE_SITE_KEY: "${TURNSTILE_SITE_KEY:-}"
    restart: unless-stopped
    ports:
      - "127.0.0.1:3005:8080"
    env_file:
      - ~/chaoscoordinator.dev.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Without this, `docker compose up --build` recreates the container on every deploy and
      # Data Protection regenerates its keyring from scratch, silently invalidating every existing
      # session cookie (and logging "key not found in the key ring" for each one).
      - keys:/app/keys
      # Bind mount (not a named volume) so uploaded photos/files land somewhere visible/backup-able
      # on the host instead of an anonymous volume under /var/lib/docker. Host dir must exist first
      # (`sudo mkdir -p /big/chaostest`) — the app runs as root in-container with no userns-remap on
      # this host, so no chown/permission fuss is needed beyond that.
      - /big/chaostest:/app/uploads

volumes:
  keys:
