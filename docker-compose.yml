services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chaos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chaos}
      POSTGRES_DB: ${POSTGRES_DB:-chaos_coordinator}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chaos} -d ${POSTGRES_DB:-chaos_coordinator}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Not exposed to the host on purpose — only `server` talks to it, over the compose network.

  server:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-chaos_coordinator};Username=${POSTGRES_USER:-chaos};Password=${POSTGRES_PASSWORD:-chaos}"
      AZURE_TENANT_ID: "${AZURE_TENANT_ID:-}"
      AZURE_CLIENT_ID: "${AZURE_CLIENT_ID:-}"
      AZURE_CLIENT_SECRET: "${AZURE_CLIENT_SECRET:-}"
      EMAIL_FROM: "${EMAIL_FROM:-}"
      APP_URL: "${APP_URL:-}"
      TURNSTILE_SECRET_KEY: "${TURNSTILE_SECRET_KEY:-}"
      VAPID_PUBLIC_KEY: "${VAPID_PUBLIC_KEY:-}"
      VAPID_PRIVATE_KEY: "${VAPID_PRIVATE_KEY:-}"
      VAPID_SUBJECT: "${VAPID_SUBJECT:-}"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    # Not exposed to the host either — `web`'s nginx proxies /api and /hubs to it internally,
    # so the browser only ever talks to one origin (see web/packages/app/nginx.conf).

  web:
    build:
      context: ./frontend
      dockerfile: packages/app/Dockerfile
      args:
        TURNSTILE_SITE_KEY: "${TURNSTILE_SITE_KEY:-}"
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - server

volumes:
  pgdata:
  uploads:
