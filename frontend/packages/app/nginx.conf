server {
    listen 80;
    root /usr/share/nginx/html;

    # nginx's own default (1M) is well below what a phone camera photo needs — without this,
    # multi-photo uploads to /api/events/import/extract 413 here, before ever reaching the .NET
    # app (so nothing shows up in its logs). Kept a bit above the app's own
    # [RequestSizeLimit(100_000_000)] on that endpoint so the app's limit is the one that actually
    # governs, not nginx's.
    client_max_body_size 110M;

    # SignalR — needs the WebSocket upgrade headers.
    location /hubs/ {
        proxy_pass http://server:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
        proxy_pass http://server:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Wall display is its own Vite entry (wall.html) with its own client-side navigation.
    location /wall {
        try_files $uri $uri/ /wall.html;
    }

    # Phone app — SPA fallback for React Router's client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
